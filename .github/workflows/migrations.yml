name: Test migrations

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  migrations:
    name: Alembic migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bitescore
          POSTGRES_PASSWORD: bitescore
          POSTGRES_DB: bitescore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bitescore -d bitescore"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://bitescore:bitescore@localhost:5432/bitescore
      JWT_SECRET: ci-test-secret-key
      CORS_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Apply migrations
        run: poetry run alembic upgrade head

      - name: Verify schema tables exist
        run: |
          poetry run python - <<'PY'
          from sqlalchemy import inspect
          from app.db.session import engine

          tables = {
              "admin_audits",
              "businesses",
              "categories",
              "claim_requests",
              "evidence_uploads",
              "locations",
              "report_flags",
              "reviews",
              "structured_scores",
              "users",
              "verification_badges",
          }
          existing = set(inspect(engine).get_table_names())
          missing = tables - existing
          assert not missing, f"Missing tables after migration: {missing}"
          print("All expected tables present.")
          PY

      - name: Downgrade and upgrade
        run: |
          poetry run alembic downgrade base
          poetry run alembic upgrade head
